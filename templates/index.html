<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Review Classifier</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background:#121212;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:90%;
            max-width:700px;
            background:#1e1e1e;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
            color:#00d4ff;
        }

        textarea{
            width:100%;
            height:180px;
            padding:15px;
            border:none;
            outline:none;
            border-radius:10px;
            resize:none;
            font-size:16px;
            margin-bottom:20px;
            background:#2c2c2c;
            color:white;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#00d4ff;
            color:black;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#00b4d8;
        }

        .result{
            margin-top:25px;
            padding:20px;
            border-radius:10px;
            background:#2c2c2c;
            text-align:center;
            display:none;
        }

        .positive{
            color:#00ff88;
            font-size:24px;
            font-weight:bold;
        }

        .negative{
            color:#ff4d4d;
            font-size:24px;
            font-weight:bold;
        }

        .loading{
            margin-top:15px;
            text-align:center;
            display:none;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🎬 Movie Review Sentiment Analysis</h1>

        <textarea 
            id="reviewInput" 
            placeholder="Write your movie review here..."
        ></textarea>

        <button onclick="predictReview()">
            Predict Sentiment
        </button>

        <div class="loading" id="loading">
            Predicting...
        </div>

        <div class="result" id="resultBox">
            <h2>Prediction Result</h2>

            <p id="predictionText"></p>

            <br>

            <p id="confidenceText"></p>
        </div>

    </div>

    <script>

        async function predictReview(){

            const review = document.getElementById("reviewInput").value;

            const resultBox = document.getElementById("resultBox");
            const predictionText = document.getElementById("predictionText");
            const confidenceText = document.getElementById("confidenceText");
            const loading = document.getElementById("loading");

            if(review.trim() === ""){
                alert("Please enter a review");
                return;
            }

            loading.style.display = "block";
            resultBox.style.display = "none";

            try{

                // CHANGE THIS URL TO YOUR API ENDPOINT
                const response = await fetch("http://127.0.0.1:5000/predict", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        review: review
                    })

                });

                const data = await response.json();

                loading.style.display = "none";
                resultBox.style.display = "block";

                predictionText.innerText = data.prediction;

                confidenceText.innerText = 
                    "Confidence: " + data.confidence + "%";

                if(data.prediction.toLowerCase() === "positive"){
                    predictionText.className = "positive";
                }
                else{
                    predictionText.className = "negative";
                }

            }
            catch(error){

                loading.style.display = "none";

                alert("Error connecting to API");

                console.log(error);
            }
        }

    </script>

</body>
</html>
